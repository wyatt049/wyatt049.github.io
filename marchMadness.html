
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>March Madness</title>

<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    margin: 0;
    padding: 20px;
  }

  /* OUTER GRID */
  .container {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    width: 900px;
    text-align: center;
    gap: 20px;
  }

  /* LEFT SECTION */
  .left {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    font-weight: bold;
  }

  /* MIDDLE SECTION (CALENDAR) */
  .calendar {
    display: grid;
    grid-template-rows: auto 1fr;
  }

  .month-title {
    font-size: 32px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    
    
  }

  .days div {
    
    padding: 10px;
    border: 1px solid white;
  }

  /* Highlight March 16–31 */
  .days div:nth-child(n+23):nth-child(-n+38) {
    background-color: gold;
  }

  /* Remove background after March 31 */
  .days div:nth-child(n+32) {
    background-color: transparent;
  }

  /* RIGHT SECTION */
  .right {
    padding: 20px;
  }

  .right h2 {
    margin-top: 0;
  }

  .container {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  width: 900px;
  text-align: center;

  border: 4px solid black;   /* outer connected box */
  padding: 20px;             /* space inside the box */
  gap: 0;                    /* sections now touch the box */
  }

</style>
</head>

<body>

<div class="container">

 

    <!-- LEFT -->
    <div class="left">MARCH MADNESS</div>

    <!-- MIDDLE -->
    <div class="calendar">
      <div class="month-title">March</div>

      <div class="days">
        <!-- 1–31 -->
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div>
        <div>8</div><div>9</div><div>10</div><div>11</div><div>12</div><div>13</div><div>14</div>
        <div>15</div><div>16</div><div>17</div><div>18</div><div>19</div><div>20</div><div>21</div>
        <div>22</div><div>23</div><div>24</div><div>25</div><div>26</div><div>27</div><div>28</div>
        <div>29</div><div>30</div><div>31</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <h2>The Wildcats</h2>
      <p>
        Hail to thee our alma mater,<br>
        standing proud and true.<br>
        Raise the banner ever higher,<br>
        glory to our blue.
      </p>
    </div>

 

</div>

</body>
</html>
