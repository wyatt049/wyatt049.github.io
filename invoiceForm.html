<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Order Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2em;
        }

        h1 {
            text-align: center; 
            color: purple; 
        }

        /* Main form grid */
        .order-form {
            display: grid;
            grid-template-columns: 15% 25% 15% 25%;
            grid-template-rows: auto auto auto auto;
            gap: 1em;
            align-items: center;
        }

        /* Table styling */
        table {
            grid-column: 1 / 5;
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid blue;
            padding: 0.5em;
            text-align: left;
            vertical-align: middle;
            height: 2em;
        }

        /* Totals section */
        .totals {
            grid-column: 1 / 5;
            display: grid;
            grid-template-columns: 20% 30% 20% 30%;
            grid-template-rows: repeat(4, 2.5em);
            gap: 0.5em;
            align-items: center;
        }

        .totals div {
            border: 1px solid #ccc;
            padding: 0.5em;
            height: 2em;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>

  <h1>Customer Order Form</h1>

<div class="order-form">


    

    <table>

        <thead>
           <tr>
              <th colspan="4" >Order Number:</th>
            </tr>
        </thead>

        <thead>
            <tr>
              <th colspan="4" >Order Date:</th>
            </tr>
        </thead>

        <thead>
            <tr>
                <th>Product Name</th>
                <th>Color</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody >
            <tr>
                <td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td></td><td></td><td></td><td></td>
            </tr>
            <tr style="background-color:black;">
                <td></td><td></td><td></td><td></td>
            </tr>
            
        </tbody>
        <thead>
            <tr>
              <th colspan="4" >Subtotal:</th>
            </tr>
        </thead>
        <thead>
            <tr>
              <th colspan="4" >Tax:</th>
            </tr>
        </thead>
        <thead>
            <tr>
              <th colspan="3" >Shipping:</th>
              <th> 5.95 </th>
            </tr>
        </thead>
        <thead>
            <tr>
              <th colspan="4" >total:</th>
            </tr>
        </thead>
    </table>

    

</div>

</body>
</html>
