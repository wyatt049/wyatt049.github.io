
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backstory</title>

<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    margin: 0;
    padding: 20px;
  }

  /* OUTER GRID */
  .container {
    display: grid;
    
    
    text-align: center;
    gap: 20px;
  }

  .title {
    font-size: 32px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 4px solid black;
    padding: 50px;
    text-align: center;
  }

  .left-box {
  width: 300px;          
  height: 300px;         
  border: 2px solid black;
  padding: 15px;
  position: absolute;
  left: 30%;               
  top: 250px;               
  background-color: white;
  }

  .Right-box {
  position: absolute;
  top: 300px;
  left: 50%;
  width: 300px;
  height: 400px;
  
}

.my-img {
  width: 100%;   /* fills the box width */
  height: auto;
}

.Bottom-box {
  width: 400px;          
  height: 50px;         
  border: 2px solid black;
  padding: 15px;
  position: absolute;
  left: 37%;               
  top: 600px;               
  background-color: white;
}

.Link-box {
  width: 400px;          
  height: 50px;         
  border: 2px solid black;
  padding: 15px;
  position: absolute;
  left: 37%;               
  top: 700px;               
  background-color: white;
}





</style>
</head>
